<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOD: GM Command Centre</title>
    <style>
        :root {
            --bg:          #04080c;
            --panel:       rgba(6, 11, 17, 0.95);
            --border:      #0f2030;
            --border-hi:   #0a3050;
            --cyan:        #00f0ff;
            --cyan-dim:    #007888;
            --green:       #00e060;
            --blue:        #0096ff;
            --red:         #ff3333;
            --yellow:      #ffd700;
            --text:        #b8dcea;
            --text-dim:    #3a6070;
            --text-mid:    #6a9cac;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            background: var(--bg);
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            color: var(--text);
            overflow: hidden;
        }

        /* ── Login Overlay ─────────────────────────────────────── */
        #loginOverlay {
            position: fixed; inset: 0;
            background: var(--bg);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 1000; gap: 20px;
        }
        #loginOverlay::before {
            content: '';
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(0,240,255,.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,240,255,.02) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
        }
        .login-eyebrow { font-size: 9px; letter-spacing: 5px; color: var(--text-dim); }
        .login-title {
            font-size: clamp(18px, 4vw, 28px);
            letter-spacing: clamp(6px, 1.5vw, 12px);
            color: var(--cyan);
            text-shadow: 0 0 40px rgba(0,240,255,.4);
        }
        .login-sub { font-size: 10px; letter-spacing: 3px; color: var(--text-dim); }
        .login-box {
            background: rgba(6,11,17,.9);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 28px 36px;
            display: flex; flex-direction: column; gap: 12px;
            min-width: 280px;
        }
        .login-label { font-size: 9px; letter-spacing: 2px; color: var(--text-dim); }
        .login-input {
            background: rgba(0,0,0,.5);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 10px 14px;
            color: var(--cyan);
            font-family: inherit; font-size: 13px; letter-spacing: 2px;
            outline: none; width: 100%;
            transition: border-color .15s;
        }
        .login-input:focus { border-color: var(--cyan); }
        .login-btn {
            padding: 12px;
            background: transparent;
            border: 1px solid var(--cyan);
            border-radius: 3px;
            color: var(--cyan);
            font-family: inherit; font-size: 11px; letter-spacing: 3px;
            cursor: pointer; transition: all .2s;
        }
        .login-btn:hover { background: rgba(0,240,255,.06); box-shadow: 0 0 24px rgba(0,240,255,.15); }
        .login-err { font-size: 10px; letter-spacing: 1.5px; color: var(--red); min-height: 14px; text-align: center; }

        /* ── Main Layout ───────────────────────────────────────── */
        #app { display: none; flex-direction: column; height: 100%; }
        #app.visible { display: flex; }

        /* Header */
        #header {
            height: 52px;
            background: rgba(4,8,12,.98);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px;
            padding: 0 18px;
            flex-shrink: 0;
        }
        .hdr-logo {
            font-size: 11px; letter-spacing: 4px;
            color: var(--cyan);
            text-shadow: 0 0 20px rgba(0,240,255,.3);
            white-space: nowrap;
        }
        .hdr-sep { width: 1px; height: 26px; background: var(--border); }
        .hdr-label { font-size: 9px; letter-spacing: 2px; color: var(--text-dim); white-space: nowrap; }
        .hdr-room-input {
            background: rgba(0,0,0,.4);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 6px 10px;
            color: var(--cyan);
            font-family: inherit; font-size: 11px; letter-spacing: 2px;
            width: 120px; outline: none;
            transition: border-color .15s;
        }
        .hdr-room-input:focus { border-color: var(--cyan); }
        .hdr-btn {
            padding: 6px 16px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 3px;
            color: var(--text-mid);
            font-family: inherit; font-size: 9px; letter-spacing: 2px;
            cursor: pointer; white-space: nowrap;
            transition: all .15s;
        }
        .hdr-btn:hover { border-color: var(--cyan); color: var(--cyan); }
        .hdr-status {
            margin-left: auto;
            font-size: 9px; letter-spacing: 2px;
            color: var(--text-dim);
            display: flex; align-items: center; gap: 6px;
        }
        .status-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--text-dim);
            transition: background .3s;
        }
        .status-dot.online { background: var(--green); box-shadow: 0 0 8px rgba(0,224,96,.5); }

        /* Content grid */
        #content {
            flex: 1; min-height: 0;
            display: grid;
            grid-template-columns: 340px 1fr;
            grid-template-rows: 1fr;
            gap: 0;
        }

        /* ── Left Panel: Map Library ───────────────────────────── */
        #libPanel {
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        .panel-hdr {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 9px; letter-spacing: 3px;
            color: var(--text-dim);
            background: rgba(0,240,255,.02);
            flex-shrink: 0;
            display: flex; align-items: center; gap: 8px;
        }
        .panel-hdr span { flex: 1; }

        /* Upload zone */
        #uploadZone {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .upload-drop {
            border: 1px dashed var(--border);
            border-radius: 4px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all .2s;
            background: rgba(0,240,255,.01);
        }
        .upload-drop:hover, .upload-drop.drag-over {
            border-color: var(--cyan);
            background: rgba(0,240,255,.04);
        }
        .upload-drop p { font-size: 9px; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 8px; }
        .upload-btn-sm {
            padding: 7px 18px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 3px;
            color: var(--text-mid);
            font-family: inherit; font-size: 9px; letter-spacing: 2px;
            cursor: pointer; transition: all .15s;
        }
        .upload-btn-sm:hover { border-color: var(--cyan); color: var(--cyan); }
        #uploadProgress {
            margin-top: 8px;
            font-size: 9px; letter-spacing: 1.5px;
            color: var(--cyan); min-height: 14px; text-align: center;
        }
        input[type="file"] { display: none; }

        /* Maps list */
        #mapList {
            flex: 1; overflow-y: auto;
            padding: 8px;
        }
        #mapList::-webkit-scrollbar { width: 4px; }
        #mapList::-webkit-scrollbar-track { background: transparent; }
        #mapList::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .map-item {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            margin-bottom: 6px;
            transition: all .15s;
            background: rgba(6,11,17,.6);
        }
        .map-item:hover { border-color: var(--border-hi); }
        .map-item.active-map {
            border-color: var(--cyan);
            background: rgba(0,240,255,.04);
        }
        .map-name {
            flex: 1; min-width: 0;
            font-size: 10px; letter-spacing: 1px;
            color: var(--text);
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .map-size { font-size: 9px; color: var(--text-dim); white-space: nowrap; }
        .map-activate {
            padding: 5px 10px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 2px;
            color: var(--text-dim);
            font-family: inherit; font-size: 8px; letter-spacing: 1.5px;
            cursor: pointer; white-space: nowrap;
            transition: all .15s;
        }
        .map-activate:hover, .map-item.active-map .map-activate {
            border-color: var(--cyan); color: var(--cyan);
        }
        .map-del {
            padding: 5px 8px;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 2px;
            color: var(--text-dim);
            font-family: inherit; font-size: 10px;
            cursor: pointer; transition: all .15s;
        }
        .map-del:hover { border-color: var(--red); color: var(--red); }
        .lib-empty { padding: 28px; text-align: center; font-size: 10px; letter-spacing: 1.5px; color: var(--text-dim); }

        /* ── Right Panel: Room Controls ────────────────────────── */
        #ctrlPanel {
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        /* Active map banner */
        #activeBanner {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            background: rgba(0,240,255,.02);
            flex-shrink: 0;
        }
        .banner-label { font-size: 9px; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 6px; }
        .banner-name {
            font-size: 13px; letter-spacing: 2px;
            color: var(--cyan);
            text-shadow: 0 0 20px rgba(0,240,255,.25);
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .banner-none { font-size: 13px; letter-spacing: 2px; color: var(--text-dim); }

        /* Control cards */
        #ctrlGrid {
            flex: 1; overflow-y: auto;
            padding: 16px;
            display: flex; flex-direction: column; gap: 12px;
        }
        #ctrlGrid::-webkit-scrollbar { width: 4px; }
        #ctrlGrid::-webkit-scrollbar-track { background: transparent; }
        #ctrlGrid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .ctrl-card {
            background: rgba(6,11,17,.8);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 16px;
        }
        .ctrl-card-title {
            font-size: 9px; letter-spacing: 2.5px;
            color: var(--text-dim); margin-bottom: 12px;
        }
        .ctrl-row { display: flex; gap: 8px; flex-wrap: wrap; }

        .ctrl-btn {
            flex: 1; min-width: 120px;
            padding: 12px 16px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 3px;
            color: var(--text-mid);
            font-family: inherit; font-size: 10px; letter-spacing: 2px;
            cursor: pointer; transition: all .15s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .ctrl-btn:hover { border-color: var(--cyan); color: var(--cyan); background: rgba(0,240,255,.03); }
        .ctrl-btn.danger:hover { border-color: var(--red); color: var(--red); background: rgba(255,51,51,.04); }
        .ctrl-btn.active-toggle {
            border-color: var(--green); color: var(--green); background: rgba(0,224,96,.05);
        }
        .ctrl-btn.inactive-toggle {
            border-color: var(--red); color: var(--red); background: rgba(255,51,51,.04);
        }

        /* Drawing list */
        #drawingsList {
            flex: 1; overflow-y: auto;
            max-height: 220px;
            margin-top: 10px;
            border: 1px solid var(--border);
            border-radius: 3px;
        }
        #drawingsList::-webkit-scrollbar { width: 4px; }
        #drawingsList::-webkit-scrollbar-track { background: transparent; }
        #drawingsList::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .drawing-row {
            display: flex; align-items: center; gap: 8px;
            padding: 7px 10px;
            border-bottom: 1px solid var(--border);
            font-size: 9px; letter-spacing: 1px; color: var(--text-mid);
        }
        .drawing-row:last-child { border-bottom: none; }
        .drawing-phase {
            padding: 2px 6px; border-radius: 2px;
            font-size: 8px; letter-spacing: 1px;
            border: 1px solid;
        }
        .drawing-phase.move      { color: var(--green); border-color: var(--green); }
        .drawing-phase.execution { color: var(--blue);  border-color: var(--blue); }
        .drawing-phase.surge     { color: var(--red);   border-color: var(--red); }
        .drawing-info { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .drawing-gm { color: var(--yellow); font-size: 8px; }
        .drawings-empty { padding: 16px; text-align: center; font-size: 10px; letter-spacing: 1.5px; color: var(--text-dim); }

        /* Stats row */
        .stats-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 4px; }
        .stat-box {
            background: rgba(0,0,0,.4);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 10px 16px;
            flex: 1; min-width: 80px;
            text-align: center;
        }
        .stat-val { font-size: 20px; color: var(--cyan); letter-spacing: 2px; }
        .stat-lbl { font-size: 8px; letter-spacing: 2px; color: var(--text-dim); margin-top: 2px; }

        /* Toast */
        #toast {
            position: fixed; top: 60px; left: 50%;
            transform: translateX(-50%);
            background: rgba(6,11,17,.97);
            border: 1px solid var(--border);
            border-radius: 3px; padding: 9px 18px;
            font-size: 10px; letter-spacing: 1.5px; color: var(--text);
            z-index: 500; pointer-events: none;
            opacity: 0; transition: opacity .25s;
            white-space: nowrap;
        }
        #toast.show { opacity: 1; }

        /* Grid background */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: -1;
            background-image:
                linear-gradient(rgba(0,240,255,.012) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,240,255,.012) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
        }
    </style>
</head>
<body>

<!-- Login overlay -->
<div id="loginOverlay">
    <div class="login-eyebrow">GOD · FIELD OPERATIONS</div>
    <div class="login-title">GM COMMAND</div>
    <div class="login-sub">RESTRICTED ACCESS</div>
    <div class="login-box">
        <div class="login-label">GM PASSWORD</div>
        <input class="login-input" type="password" id="loginPw" placeholder="enter password" autocomplete="off">
        <button class="login-btn" id="loginBtn">AUTHENTICATE</button>
        <div class="login-err" id="loginErr"></div>
    </div>
</div>

<!-- Main app -->
<div id="app">
    <!-- Header -->
    <div id="header">
        <div class="hdr-logo">GOD · GM</div>
        <div class="hdr-sep"></div>
        <div class="hdr-label">ROOM</div>
        <input class="hdr-room-input" type="text" id="roomInput" value="default" placeholder="room id">
        <button class="hdr-btn" id="refreshBtn">↻ REFRESH</button>
        <div class="hdr-status">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">OFFLINE</span>
        </div>
    </div>

    <!-- Content -->
    <div id="content">
        <!-- Left: Map Library -->
        <div id="libPanel">
            <div class="panel-hdr">
                <span>MAP LIBRARY</span>
                <span id="mapCount" style="color:var(--cyan)">0 FILES</span>
            </div>

            <div id="uploadZone">
                <div class="upload-drop" id="dropZone">
                    <p>DRAG &amp; DROP .GRIDMAP OR</p>
                    <button class="upload-btn-sm" id="uploadPickBtn">⬆ SELECT FILE</button>
                </div>
                <input type="file" id="fileInput" accept=".gridmap" multiple>
                <div id="uploadProgress"></div>
            </div>

            <div id="mapList"></div>
        </div>

        <!-- Right: Room Controls -->
        <div id="ctrlPanel">
            <div id="activeBanner">
                <div class="banner-label">ACTIVE MAP — ROOM: <span id="bannerRoom">default</span></div>
                <div class="banner-name banner-none" id="bannerName">NO MAP ACTIVE</div>
            </div>

            <div id="ctrlGrid">
                <!-- Stats -->
                <div class="ctrl-card">
                    <div class="ctrl-card-title">ROOM STATISTICS</div>
                    <div class="stats-row">
                        <div class="stat-box">
                            <div class="stat-val" id="statDrawings">0</div>
                            <div class="stat-lbl">DRAWINGS</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-val" id="statPlayers">0</div>
                            <div class="stat-lbl">CONNECTED</div>
                        </div>
                        <div class="stat-box" style="border-color:var(--border)">
                            <div class="stat-val" id="statVisible" style="color:var(--green)">ON</div>
                            <div class="stat-lbl">VISIBLE</div>
                        </div>
                    </div>
                </div>

                <!-- Controls -->
                <div class="ctrl-card">
                    <div class="ctrl-card-title">PLAYER CONTROLS</div>
                    <div class="ctrl-row">
                        <button class="ctrl-btn active-toggle" id="visibilityBtn">
                            👁 DRAWINGS VISIBLE
                        </button>
                        <button class="ctrl-btn danger" id="clearBtn">
                            ✕ CLEAR ALL PLAYERS
                        </button>
                    </div>
                </div>

                <!-- Submitted drawings -->
                <div class="ctrl-card" style="flex:1">
                    <div class="ctrl-card-title">SUBMITTED PLANS</div>
                    <div id="drawingsList">
                        <div class="drawings-empty">NO DRAWINGS SUBMITTED</div>
                    </div>
                </div>

                <!-- Player share link -->
                <div class="ctrl-card">
                    <div class="ctrl-card-title">PLAYER LINK</div>
                    <div style="display:flex;gap:8px;align-items:center;">
                        <div id="playerLink" style="flex:1;font-size:10px;color:var(--text-mid);letter-spacing:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></div>
                        <button class="ctrl-btn" style="flex:0 0 auto;min-width:80px;" id="copyLinkBtn">COPY</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ================================================================
// GM Admin  —  client-side logic
// ================================================================

let gmPassword  = '';
let currentRoom = 'default';
let socket      = null;
let roomState   = { activeMap: null, drawings: [], drawingsVisible: true };
let playerCount = 0;

// ── Auth ─────────────────────────────────────────────────────────
document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('loginPw').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
});

function doLogin() {
    const pw = document.getElementById('loginPw').value.trim();
    if (!pw) { setLoginErr('ENTER PASSWORD'); return; }

    // Verify password by hitting a GM-only endpoint
    fetch('/api/maps', { headers: { 'x-gm-password': pw } })
        .then(r => {
            if (!r.ok) throw new Error('WRONG PASSWORD');
            return r.json();
        })
        .then(() => {
            gmPassword = pw;
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('app').classList.add('visible');
            initSocket();
            loadLibrary();
            updateRoomUI();
        })
        .catch(err => setLoginErr(err.message.toUpperCase()));
}

function setLoginErr(msg) {
    document.getElementById('loginErr').textContent = msg;
    setTimeout(() => { document.getElementById('loginErr').textContent = ''; }, 3000);
}

// ── Socket.io ─────────────────────────────────────────────────────
function initSocket() {
    socket = io();

    socket.on('connect', () => {
        document.getElementById('statusDot').classList.add('online');
        document.getElementById('statusText').textContent = 'ONLINE';
        socket.emit('join-room', { roomId: currentRoom, password: gmPassword });
    });

    socket.on('disconnect', () => {
        document.getElementById('statusDot').classList.remove('online');
        document.getElementById('statusText').textContent = 'OFFLINE';
    });

    socket.on('room-state', state => {
        roomState = state;
        renderRoomState();
    });

    socket.on('drawings-updated', drawings => {
        roomState.drawings = drawings;
        renderDrawings();
        updateStats();
    });

    socket.on('drawings-updated-gm', drawings => {
        roomState.drawings = drawings;
        renderDrawings();
        updateStats();
    });

    socket.on('drawings-cleared', () => {
        roomState.drawings = [];
        renderDrawings();
        updateStats();
    });

    socket.on('map-changed', map => {
        roomState.activeMap = map;
        updateActiveBanner();
        showToast('MAP CHANGED: ' + map.filename.toUpperCase());
    });

    socket.on('visibility-changed', visible => {
        roomState.drawingsVisible = visible;
        updateVisibilityBtn();
    });
}

// ── Room selection ────────────────────────────────────────────────
document.getElementById('roomInput').addEventListener('change', () => {
    currentRoom = document.getElementById('roomInput').value.trim() || 'default';
    if (socket) socket.emit('join-room', { roomId: currentRoom, password: gmPassword });
    updateRoomUI();
    loadLibrary();
});

document.getElementById('refreshBtn').addEventListener('click', () => {
    if (socket) socket.emit('join-room', { roomId: currentRoom, password: gmPassword });
    loadLibrary();
    showToast('REFRESHED');
});

function updateRoomUI() {
    document.getElementById('bannerRoom').textContent = currentRoom;
    const base = `${location.protocol}//${location.host}`;
    const link = `${base}/tactical_player.html?room=${encodeURIComponent(currentRoom)}`;
    document.getElementById('playerLink').textContent = link;
    document.getElementById('playerLink').title = link;
}

document.getElementById('copyLinkBtn').addEventListener('click', () => {
    const text = document.getElementById('playerLink').textContent;
    navigator.clipboard.writeText(text).then(() => showToast('LINK COPIED'));
});

// ── Library ───────────────────────────────────────────────────────
function loadLibrary() {
    fetch('/api/maps', { headers: { 'x-gm-password': gmPassword } })
        .then(r => r.json())
        .then(files => renderLibrary(files))
        .catch(() => showToast('ERROR LOADING LIBRARY'));
}

function renderLibrary(files) {
    const list = document.getElementById('mapList');
    document.getElementById('mapCount').textContent = `${files.length} FILE${files.length !== 1 ? 'S' : ''}`;

    if (!files.length) {
        list.innerHTML = '<div class="lib-empty">NO MAPS UPLOADED<br>DROP A .GRIDMAP TO BEGIN</div>';
        return;
    }

    const activeFilename = roomState.activeMap?.filename || null;
    list.innerHTML = '';

    files.forEach(f => {
        const item = document.createElement('div');
        item.className = 'map-item' + (f.filename === activeFilename ? ' active-map' : '');

        const size = formatBytes(f.size);
        item.innerHTML = `
            <div class="map-name" title="${esc(f.filename)}">${esc(f.filename)}</div>
            <div class="map-size">${size}</div>
            <button class="map-activate" data-fn="${esc(f.filename)}">
                ${f.filename === activeFilename ? '● ACTIVE' : 'ACTIVATE'}
            </button>
            <button class="map-del" data-fn="${esc(f.filename)}" title="Delete">✕</button>
        `;

        item.querySelector('.map-activate').addEventListener('click', () => activateMap(f.filename));
        item.querySelector('.map-del').addEventListener('click', () => deleteMap(f.filename));
        list.appendChild(item);
    });
}

function activateMap(filename) {
    fetch('/api/activate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-gm-password': gmPassword },
        body: JSON.stringify({ roomId: currentRoom, filename })
    })
    .then(r => r.json())
    .then(data => {
        if (data.error) { showToast('ERROR: ' + data.error.toUpperCase()); return; }
        roomState.activeMap = data.activeMap;
        roomState.drawings  = [];
        updateActiveBanner();
        renderDrawings();
        loadLibrary();
        showToast('MAP ACTIVATED: ' + filename.toUpperCase());
    })
    .catch(() => showToast('NETWORK ERROR'));
}

function deleteMap(filename) {
    if (!confirm(`Delete "${filename}"?`)) return;
    fetch(`/api/maps/${encodeURIComponent(filename)}`, {
        method: 'DELETE',
        headers: { 'x-gm-password': gmPassword }
    })
    .then(r => r.json())
    .then(d => {
        if (d.error) { showToast('ERROR: ' + d.error.toUpperCase()); return; }
        loadLibrary();
        showToast('FILE DELETED');
    })
    .catch(() => showToast('NETWORK ERROR'));
}

// ── Upload ────────────────────────────────────────────────────────
document.getElementById('uploadPickBtn').addEventListener('click', () => {
    document.getElementById('fileInput').click();
});
document.getElementById('fileInput').addEventListener('change', e => {
    const files = [...e.target.files];
    files.forEach(f => uploadFile(f));
    e.target.value = '';
});

const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const files = [...e.dataTransfer.files].filter(f => f.name.toLowerCase().endsWith('.gridmap'));
    if (!files.length) { showToast('DROP .GRIDMAP FILES ONLY'); return; }
    files.forEach(f => uploadFile(f));
});

function uploadFile(file) {
    const prog = document.getElementById('uploadProgress');
    prog.textContent = `UPLOADING ${file.name.toUpperCase()}…`;

    const fd = new FormData();
    fd.append('map', file);

    fetch('/api/upload', {
        method: 'POST',
        headers: { 'x-gm-password': gmPassword },
        body: fd
    })
    .then(r => r.json())
    .then(d => {
        if (d.error) { prog.textContent = 'ERROR: ' + d.error.toUpperCase(); return; }
        prog.textContent = '';
        loadLibrary();
        showToast('UPLOADED: ' + d.filename.toUpperCase());
    })
    .catch(() => { prog.textContent = 'UPLOAD FAILED'; });
}

// ── Controls ──────────────────────────────────────────────────────
document.getElementById('clearBtn').addEventListener('click', () => {
    if (!roomState.drawings.length) { showToast('NO DRAWINGS TO CLEAR'); return; }
    if (!confirm('Clear ALL player drawings? This cannot be undone.')) return;

    fetch(`/api/clear/${encodeURIComponent(currentRoom)}`, {
        method: 'POST',
        headers: { 'x-gm-password': gmPassword }
    })
    .then(r => r.json())
    .then(() => { showToast('ALL DRAWINGS CLEARED'); })
    .catch(() => showToast('NETWORK ERROR'));
});

document.getElementById('visibilityBtn').addEventListener('click', () => {
    fetch(`/api/visibility/${encodeURIComponent(currentRoom)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-gm-password': gmPassword },
        body: JSON.stringify({})
    })
    .then(r => r.json())
    .then(d => {
        roomState.drawingsVisible = d.drawingsVisible;
        updateVisibilityBtn();
        showToast(d.drawingsVisible ? 'DRAWINGS NOW VISIBLE TO PLAYERS' : 'DRAWINGS HIDDEN FROM PLAYERS');
    })
    .catch(() => showToast('NETWORK ERROR'));
});

// ── UI Updates ────────────────────────────────────────────────────
function renderRoomState() {
    updateActiveBanner();
    renderDrawings();
    updateStats();
    updateVisibilityBtn();
}

function updateActiveBanner() {
    const banner = document.getElementById('bannerName');
    if (roomState.activeMap) {
        banner.textContent = roomState.activeMap.filename.toUpperCase();
        banner.className = 'banner-name';
    } else {
        banner.textContent = 'NO MAP ACTIVE';
        banner.className = 'banner-name banner-none';
    }
}

function renderDrawings() {
    const list = document.getElementById('drawingsList');
    const drawings = roomState.drawings || [];

    if (!drawings.length) {
        list.innerHTML = '<div class="drawings-empty">NO DRAWINGS SUBMITTED</div>';
        return;
    }

    list.innerHTML = '';
    drawings.forEach((d, i) => {
        const row = document.createElement('div');
        row.className = 'drawing-row';
        row.innerHTML = `
            <span class="drawing-phase ${d.phase}">${(d.phase || '?').toUpperCase().slice(0,4)}</span>
            <span class="drawing-info">#${i + 1} ${(d.shape || '?').toUpperCase()} — ${d.cells?.length ?? 0} CELLS</span>
            ${d.isGM ? '<span class="drawing-gm">GM</span>' : ''}
        `;
        list.appendChild(row);
    });
}

function updateStats() {
    document.getElementById('statDrawings').textContent = (roomState.drawings || []).length;
}

function updateVisibilityBtn() {
    const btn = document.getElementById('visibilityBtn');
    const vis = document.getElementById('statVisible');
    if (roomState.drawingsVisible) {
        btn.className = 'ctrl-btn active-toggle';
        btn.textContent = '👁 DRAWINGS VISIBLE';
        vis.textContent = 'ON';
        vis.style.color = 'var(--green)';
    } else {
        btn.className = 'ctrl-btn inactive-toggle';
        btn.textContent = '🚫 DRAWINGS HIDDEN';
        vis.textContent = 'OFF';
        vis.style.color = 'var(--red)';
    }
}

// ── Utilities ─────────────────────────────────────────────────────
function formatBytes(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function esc(s) {
    return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}

let toastTimer;
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// Init player link on load
updateRoomUI();
</script>
